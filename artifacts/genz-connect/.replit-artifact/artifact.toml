kind = "web"
previewPath = "/"
title = "LNCT GenZ Connect"
version = "1.0.0"
id = "artifacts/genz-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22077

[services.development]
run = "pnpm --filter @workspace/genz-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/genz-connect", "run", "build" ]
publicDir = "artifacts/genz-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22077"
BASE_PATH = "/"
